<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Theos Brief · 德文聽寫練習</title>
<style>
  :root {
    --bg: #f5f1e8;
    --paper: #fffdf7;
    --ink: #2c2418;
    --muted: #8b7d65;
    --accent: #c17817;
    --accent-dark: #8b5510;
    --accent-light: #fff2dc;
    --ok: #2e7d32;
    --ok-bg: #d4f1d4;
    --wrong: #c62828;
    --wrong-bg: #ffd6d6;
    --pending: #b8a98a;
    --shadow: rgba(0, 0, 0, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #f5f1e8 0%, #e8dfc9 100%);
    color: var(--ink);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
    line-height: 1.6;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 {
    font-size: 1.6rem;
    color: var(--accent-dark);
    margin-bottom: 0.3rem;
  }
  header .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 0.6rem; }
  .lesson-picker {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--paper);
    padding: 0.35rem 0.8rem;
    border-radius: 999px;
    box-shadow: 0 2px 8px var(--shadow);
    font-size: 0.9rem;
    color: var(--accent-dark);
    font-weight: 600;
  }
  .lesson-picker select {
    border: none;
    background: transparent;
    color: var(--accent-dark);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .lesson-picker select:focus { outline: 2px solid var(--accent); }

  /* Progress bar */
  .progress-wrap {
    background: var(--paper);
    border-radius: 12px;
    padding: 0.8rem 1rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .progress-bar {
    height: 8px;
    background: #e8dfc9;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--ok));
    transition: width 0.3s ease;
    border-radius: 999px;
  }
  .dots {
    display: flex;
    gap: 4px;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }
  .dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #e8dfc9;
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
  }
  .dot:hover { transform: scale(1.1); }
  .dot.current { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); }
  .dot.done { background: var(--ok); color: white; }
  .dot.attempted { background: var(--accent); color: white; }

  /* Sentence card */
  .card {
    background: var(--paper);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    box-shadow: 0 6px 24px var(--shadow);
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
    align-items: center;
  }

  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.55rem 1rem;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-family: inherit;
  }
  button:hover:not(:disabled) {
    background: var(--accent-dark);
    transform: translateY(-1px);
  }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--accent-dark);
    border: 2px solid var(--accent);
    padding: 0.4rem 0.85rem;
  }
  button.ghost:hover:not(:disabled) { background: var(--accent); color: white; }
  button.ok-btn { background: var(--ok); }
  button.ok-btn:hover:not(:disabled) { background: #1b5e20; }

  .status {
    margin-left: auto;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 600;
  }

  .volume-control {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--accent-light);
    padding: 0.3rem 0.6rem;
    border-radius: 999px;
    border: 1.5px solid #e8d4a8;
  }
  .volume-control input[type="range"] {
    width: 90px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .volume-control .val {
    font-size: 0.75rem;
    color: var(--accent-dark);
    min-width: 36px;
  }
  .icon-btn {
    background: transparent;
    color: var(--accent-dark);
    border: none;
    padding: 2px 6px;
    font-size: 1.05rem;
    line-height: 1;
    cursor: pointer;
    border-radius: 6px;
    font-weight: 600;
  }
  .icon-btn:hover { background: rgba(193, 120, 23, 0.15); transform: none; }
  .volume-control.muted { opacity: 0.55; }

  .translation {
    background: var(--accent-light);
    border-left: 4px solid var(--accent);
    padding: 0.6rem 0.9rem;
    border-radius: 6px;
    margin-bottom: 1rem;
    font-size: 0.95rem;
    color: var(--accent-dark);
    display: none;
  }
  .translation.show { display: block; }

  /* Input */
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 0.85rem 1rem;
    border: 2px solid #e0d4b8;
    border-radius: 12px;
    font-family: "Georgia", "Noto Serif TC", serif;
    font-size: 1.1rem;
    line-height: 1.6;
    resize: vertical;
    background: #fffefb;
    color: var(--ink);
    transition: border-color 0.2s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(193, 120, 23, 0.15);
  }

  /* Live diff display */
  .diff {
    margin-top: 0.75rem;
    padding: 0.85rem 1rem;
    background: #faf6ec;
    border-radius: 10px;
    font-family: "Menlo", "Consolas", "Noto Sans Mono CJK TC", monospace;
    font-size: 1.05rem;
    line-height: 1.8;
    word-break: break-word;
    min-height: 56px;
    border: 1px dashed #d4c9b0;
  }
  .diff:empty::before {
    content: "（這裡會即時顯示對錯比對·字母用 _ 隱藏，標點和空格保留）";
    color: var(--pending);
    font-style: italic;
    font-size: 0.9rem;
    font-family: inherit;
  }
  .diff .ok { color: var(--ok); background: var(--ok-bg); padding: 1px 0; }
  .diff .wrong { color: var(--wrong); background: var(--wrong-bg); padding: 1px 0; text-decoration: underline wavy; }
  .diff .missing { color: var(--pending); }
  .diff .placeholder {
    color: var(--pending);
    opacity: 0.6;
    letter-spacing: 1px;
  }
  .diff .placeholder-punct {
    color: var(--pending);
    opacity: 0.85;
    font-weight: 600;
  }
  .diff .next-hint {
    background: var(--accent);
    color: white;
    padding: 1px 5px;
    border-radius: 3px;
    animation: pulse 1.2s infinite;
    margin: 0 1px;
  }
  .diff .space-marker { color: var(--pending); opacity: 0.6; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .feedback {
    margin-top: 0.6rem;
    font-size: 0.9rem;
    font-weight: 600;
    min-height: 1.4em;
  }
  .feedback.success { color: var(--ok); }
  .feedback.error { color: var(--wrong); }

  /* Word chips */
  .words-section {
    margin-top: 1.2rem;
    padding-top: 1rem;
    border-top: 1px dashed #e0d4b8;
  }
  .words-section h3 {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
    font-weight: 600;
  }
  .words {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .word-chip {
    display: inline-flex;
    align-items: center;
    background: var(--accent-light);
    color: var(--accent-dark);
    padding: 0.35rem 0.6rem;
    border-radius: 8px;
    font-family: "Georgia", serif;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
    user-select: none;
  }
  .word-chip:hover {
    background: var(--accent);
    color: white;
    transform: translateY(-2px);
  }
  .word-chip.hidden {
    background: #eee7d4;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.9rem;
    border: 1.5px dashed #c9bb9b;
  }
  .word-chip.hidden:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .word-chip.hidden .chip-num {
    font-weight: 700;
    margin-right: 3px;
    opacity: 0.75;
  }
  .word-chip .spell-btn {
    margin-left: 0.4rem;
    background: rgba(0,0,0,0.1);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.7rem;
    font-weight: 700;
  }
  .word-chip:hover .spell-btn { background: rgba(255,255,255,0.25); }

  /* Navigation */
  .nav {
    display: flex;
    gap: 0.6rem;
    justify-content: space-between;
    align-items: center;
  }

  /* Settings */
  details {
    background: var(--paper);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    box-shadow: 0 2px 8px var(--shadow);
    font-size: 0.85rem;
  }
  details summary {
    cursor: pointer;
    color: var(--muted);
    font-weight: 600;
    user-select: none;
  }
  .settings-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.6rem;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px dashed #e0d4b8;
  }
  .settings-grid label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
  }
  .settings-grid input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  .settings-grid select, .settings-grid input[type="checkbox"] {
    accent-color: var(--accent);
  }
  .settings-grid select {
    padding: 0.3rem 0.5rem;
    border-radius: 6px;
    border: 1px solid #d4c9b0;
    background: white;
    flex: 1;
  }
  .val { font-weight: 700; color: var(--accent-dark); min-width: 30px; text-align: right; }

  kbd {
    background: #e8dfc9;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.75rem;
    font-family: "Menlo", monospace;
    color: var(--accent-dark);
    margin: 0 2px;
  }

  .hint-text { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; }

  @media (max-width: 600px) {
    body { padding: 1rem 0.5rem; }
    .card { padding: 1rem; }
    .toolbar button { padding: 0.45rem 0.7rem; font-size: 0.85rem; }
    .status { width: 100%; margin-left: 0; text-align: right; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1 id="lessonTitle">📮 Theos Brief · 德文聽寫練習</h1>
    <p class="subtitle">聽 → 打 → 即時比對</p>
    <div class="lesson-picker">
      <label for="lessonSelect">📚 課文：</label>
      <select id="lessonSelect"></select>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progressText">第 1 句 / 共 11 句</span>
      <span id="scoreText">完美：0 ｜ 已試：0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="card">
    <div class="toolbar">
      <button id="playBtn" title="播放本句 (Tab)">▶ 播放本句</button>
      <button id="slowBtn" class="ghost" title="慢速播放 (Shift+Tab)">🐢 慢速</button>
      <button id="hintBtn" class="ghost" title="提示下一個字母">💡 提示</button>
      <button id="revealBtn" class="ghost" title="顯示完整答案">👁 答案</button>
      <button id="transBtn" class="ghost" title="顯示翻譯">🌐 翻譯</button>

      <div class="volume-control" title="音量 (按 M 靜音)">
        <button id="muteBtn" class="icon-btn" aria-label="靜音切換">🔊</button>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1" aria-label="音量" />
        <span class="val" id="volumeVal">100%</span>
      </div>

      <span id="statusText" class="status"></span>
    </div>

    <div id="translation" class="translation"></div>

    <textarea id="input" placeholder="點「▶ 播放本句」，然後在這裡輸入你聽到的德文…" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>

    <div id="diff" class="diff"></div>

    <div id="feedback" class="feedback"></div>

    <div class="words-section">
      <h3>🔤 單字朗讀（點擊即播，文字在完成前隱藏）</h3>
      <div id="words" class="words"></div>
      <p class="hint-text">虛線框 = 文字隱藏，只能用聽的 · 點「拼」逐字母朗讀（也不顯示文字）· 完成整句或按「👁 答案」才會顯示拼寫。</p>
    </div>

    <div class="nav" style="margin-top: 1.2rem;">
      <button id="prevBtn" class="ghost">← 上一句</button>
      <span style="color: var(--muted); font-size: 0.8rem;">
        快捷鍵：<kbd>Tab</kbd> 重播 · <kbd>Shift+Tab</kbd> 慢播 · <kbd>Enter</kbd> 下一句 · <kbd>M</kbd> 靜音
      </span>
      <button id="nextBtn" class="ok-btn">下一句 →</button>
    </div>
  </div>

  <details>
    <summary>⚙ 設定</summary>
    <div class="settings-grid">
      <label>正常語速 <input type="range" id="rate" min="0.5" max="1.3" step="0.05" value="0.95" /><span class="val" id="rateVal">0.95</span></label>
      <label>慢速 <input type="range" id="slowRate" min="0.4" max="0.9" step="0.05" value="0.6" /><span class="val" id="slowVal">0.6</span></label>
      <label>音調 <input type="range" id="pitch" min="0.5" max="1.5" step="0.05" value="1" /><span class="val" id="pitchVal">1</span></label>
      <label>聲音 <select id="voice"></select></label>
      <label><input type="checkbox" id="strictCase" /> 嚴格大小寫（關閉時 Wie 和 wie 視為相同）</label>
      <label><input type="checkbox" id="strictPunct" /> 嚴格標點（關閉時忽略 ,.?!:- 等差異）</label>
    </div>
  </details>
</div>

<script>
"use strict";

// ===== Lesson data =====
const LESSONS = [
  {
    title: "📮 Theos Brief aus Frankfurt",

      { de: "Lieber Papa, liebe Mama,", zh: "親愛的爸爸、媽媽：" },

let currentLesson = 0;
let SENTENCES = LESSONS[currentLesson].sentences;

// ===== German letter pronunciation =====
// macOS / Chrome de-DE voices pronounce single letters with their German
// name correctly when given the bare letter. We only need explicit names
// for umlauts/eszett where the bare char sounds like a vowel sound only.
const LETTER_NAMES = {
  'ä': 'A Umlaut',
  'ö': 'O Umlaut',
  'ü': 'U Umlaut',
  'ß': 'Eszett',
};
function letterToSpeak(letter) {
  const lower = letter.toLowerCase();
  // Send lowercase to TTS so German voices don't prepend "Großes" / "Kleines"
  // (capital / lowercase prefix). Umlauts still use explicit names.
  return LETTER_NAMES[lower] || lower;
}

// ===== State =====
let current = 0;
let attempted = new Set();
let completed = new Set();
let voices = [];
let playbackToken = 0;
let revealed = false;

// ===== DOM =====
const $ = (id) => document.getElementById(id);
const input = $('input');
const diffEl = $('diff');
const feedbackEl = $('feedback');
const wordsEl = $('words');
const translationEl = $('translation');
const statusEl = $('statusText');
const dotsEl = $('dots');
const progressFill = $('progressFill');
const progressText = $('progressText');
const scoreText = $('scoreText');
const voiceSelect = $('voice');

// ===== Speech synthesis =====
const synth = window.speechSynthesis;

function loadVoices() {
  voices = synth.getVoices();
  const de = voices.filter(v => v.lang.startsWith('de'));
  const others = voices.filter(v => !v.lang.startsWith('de'));
  const sorted = [...de, ...others];
  voiceSelect.innerHTML = '';
  sorted.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = voices.indexOf(v);
    opt.textContent = `${v.name} (${v.lang})${v.lang.startsWith('de') ? ' ⭐' : ''}`;
    if (i === 0) opt.selected = true;
    voiceSelect.appendChild(opt);
  });
}
loadVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

let isMuted = false;
let volumeBeforeMute = 1;

function getVolume() {
  return isMuted ? 0 : parseFloat($('volume').value);
}

function makeUtterance(text, rateOverride) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = rateOverride != null ? rateOverride : parseFloat($('rate').value);
  u.pitch = parseFloat($('pitch').value);
  u.volume = getVolume();
  const idx = parseInt(voiceSelect.value);
  if (!isNaN(idx) && voices[idx]) u.voice = voices[idx];
  return u;
}

function updateVolumeUI() {
  const v = parseFloat($('volume').value);
  const muteBtn = $('muteBtn');
  const valEl = $('volumeVal');
  const wrap = document.querySelector('.volume-control');
  if (isMuted || v === 0) {
    muteBtn.textContent = '🔇';
    wrap.classList.add('muted');
  } else if (v < 0.34) {
    muteBtn.textContent = '🔈';
    wrap.classList.remove('muted');
  } else if (v < 0.67) {
    muteBtn.textContent = '🔉';
    wrap.classList.remove('muted');
  } else {
    muteBtn.textContent = '🔊';
    wrap.classList.remove('muted');
  }
  valEl.textContent = isMuted ? '靜音' : Math.round(v * 100) + '%';
}

function toggleMute() {
  if (isMuted) {
    isMuted = false;
    if (parseFloat($('volume').value) === 0) {
      $('volume').value = volumeBeforeMute > 0 ? volumeBeforeMute : 0.5;
    }
  } else {
    volumeBeforeMute = parseFloat($('volume').value);
    isMuted = true;
  }
  updateVolumeUI();
}

function speak(text, rateOverride, onDone) {
  const myToken = ++playbackToken;
  synth.cancel();
  const u = makeUtterance(text, rateOverride);
  const finish = () => {
    if (myToken !== playbackToken) return;
    statusEl.textContent = '';
    if (onDone) onDone();
  };
  u.onend = finish;
  u.onerror = finish;
  statusEl.textContent = '🔊 播放中…';
  synth.speak(u);
}

function speakSentence(slow) {
  const text = SENTENCES[current].de;
  const rate = slow ? parseFloat($('slowRate').value) : parseFloat($('rate').value);
  speak(text, rate);
}

function speakWord(word) {
  speak(word.replace(/[^\p{L}\p{N}äöüÄÖÜß-]/gu, ''));
}

function speakLetter(letter) {
  speak(letterToSpeak(letter));
}

function spellWord(word) {
  const cleaned = word.replace(/[^\p{L}äöüÄÖÜß]/gu, '');
  const letters = [...cleaned];
  if (letters.length === 0) return;

  const myToken = ++playbackToken;
  let i = 0;

  function next() {
    if (myToken !== playbackToken) return;
    if (i >= letters.length) {
      // Don't auto-speak the whole word here. In hidden mode that would
      // leak the answer; if user wants the full word they can click 🔊.
      statusEl.textContent = '🔤 拼讀完成';
      setTimeout(() => {
        if (myToken === playbackToken) statusEl.textContent = '';
      }, 1500);
      return;
    }
    const u = makeUtterance(letterToSpeak(letters[i]), 0.7);
    u.onend = () => {
      // Small pause between letters so they don't run together.
      if (myToken !== playbackToken) return;
      setTimeout(() => { i++; next(); }, 180);
    };
    u.onerror = u.onend;
    statusEl.textContent = `🔤 字母 ${i + 1} / ${letters.length}`;
    synth.speak(u);
  }

  synth.cancel();
  next();
}

// ===== Comparison logic =====
function normalizeChar(c) {
  if (!$('strictCase').checked) c = c.toLowerCase();
  return c;
}
function isPunct(c) { return /[.,!?;:"'()\-–—]/u.test(c); }
function isSpace(c) { return /\s/.test(c); }

function shouldSkip(c) {
  return !$('strictPunct').checked && isPunct(c);
}

function tryUmlautMatch(typed, ti, target, gi) {
  // Returns number of typed chars consumed if matches, else 0
  const g = target[gi];
  if (!g) return 0;
  const map = {'ä':'ae','ö':'oe','ü':'ue','ß':'ss','Ä':'ae','Ö':'oe','Ü':'ue'};
  const expansion = map[g];
  if (!expansion) return 0;
  const slice = typed.slice(ti, ti + 2).toLowerCase();
  if (slice === expansion) return 2;
  return 0;
}

function compare(typed, target) {
  // Returns: { html, isComplete, isAllCorrect, correctChars, firstWrongIdx }
  const out = [];
  let ti = 0, gi = 0;
  let firstWrong = -1;
  let correctChars = 0;

  // Helper: skip ignorable chars in target
  function skipTarget() {
    while (gi < target.length && shouldSkip(target[gi])) {
      out.push(`<span class="missing">${escape(target[gi])}</span>`);
      gi++;
    }
  }

  while (ti < typed.length) {
    if (firstWrong !== -1) {
      // After first wrong, mark everything else as wrong (no advance on target)
      out.push(`<span class="wrong">${escape(typed[ti])}</span>`);
      ti++;
      continue;
    }

    skipTarget();

    if (gi >= target.length) {
      // Extra chars typed beyond end
      firstWrong = ti;
      out.push(`<span class="wrong">${escape(typed[ti])}</span>`);
      ti++;
      continue;
    }

    const t = typed[ti];
    const g = target[gi];

    // Skip user's typed punctuation if non-strict
    if (shouldSkip(t) && !shouldSkip(g) && normalizeChar(t) !== normalizeChar(g)) {
      out.push(`<span class="ok">${escape(t)}</span>`);
      ti++;
      correctChars++;
      continue;
    }

    // Umlaut shortcut: target has ä, user types "ae"
    const umlautConsume = tryUmlautMatch(typed, ti, target, gi);
    if (umlautConsume > 0) {
      for (let k = 0; k < umlautConsume; k++) {
        out.push(`<span class="ok">${escape(typed[ti + k])}</span>`);
      }
      ti += umlautConsume;
      gi++;
      correctChars += umlautConsume;
      continue;
    }

    if (normalizeChar(t) === normalizeChar(g)) {
      const display = isSpace(t) ? '·' : escape(t);
      const cls = isSpace(t) ? 'ok space-marker' : 'ok';
      out.push(`<span class="${cls}">${display}</span>`);
      ti++; gi++; correctChars++;
    } else {
      firstWrong = ti;
      out.push(`<span class="wrong">${escape(t)}</span>`);
      ti++;
    }
  }

  const visibleChar = (c) => c === ' ' ? '·' : escape(c);
  // Mask letters/digits as "_" so the answer isn't given away.
  // Keep spaces & punctuation visible so user sees sentence structure.
  const maskChar = (c) => {
    if (c === ' ') return '<span class="placeholder">·</span>';
    if (/[\p{L}\p{N}]/u.test(c)) return '<span class="placeholder">_</span>';
    return `<span class="placeholder-punct">${escape(c)}</span>`;
  };
  // The very next expected char gets a single underscore highlight (no letter shown)
  const maskNext = (c) => {
    if (c === ' ') return '<span class="next-hint">·</span>';
    if (/[\p{L}\p{N}]/u.test(c)) return '<span class="next-hint">_</span>';
    return `<span class="next-hint">${escape(c)}</span>`;
  };

  let trailingHtml = '';
  skipTarget();
  if (firstWrong === -1 && gi < target.length) {
    trailingHtml += maskNext(target[gi]);
    for (let k = gi + 1; k < target.length; k++) {
      trailingHtml += maskChar(target[k]);
    }
  } else if (firstWrong !== -1 && gi < target.length) {
    // After a wrong char, show the rest as masked too (don't leak the answer)
    trailingHtml += ' <span class="missing">⟶ </span>';
    for (let k = gi; k < target.length; k++) {
      trailingHtml += maskChar(target[k]);
    }
  }

  const isComplete = (firstWrong === -1 && gi >= target.length);

  return {
    html: out.join('') + trailingHtml,
    isComplete,
    correctChars,
    firstWrongIdx: firstWrong,
  };
}

function escape(c) {
  return String(c)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== Render =====
function renderDots() {
  dotsEl.innerHTML = '';
  SENTENCES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    if (i === current) d.classList.add('current');
    if (completed.has(i)) d.classList.add('done');
    else if (attempted.has(i)) d.classList.add('attempted');
    d.textContent = i + 1;
    d.title = `第 ${i + 1} 句`;
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  });
}

function renderProgress() {
  const pct = Math.round((completed.size / SENTENCES.length) * 100);
  progressFill.style.width = pct + '%';
  progressText.textContent = `第 ${current + 1} 句 / 共 ${SENTENCES.length} 句`;
  scoreText.textContent = `完美：${completed.size} ｜ 已試：${attempted.size}`;
}

function renderTranslation() {
  translationEl.textContent = SENTENCES[current].zh;
}

function tokenizeWords(sentence) {
  // Split on whitespace, keep punctuation attached
  return sentence.split(/\s+/).filter(Boolean);
}

function renderWordChips(showText) {
  // Chips always appear (for audio playback), but the word text is only
  // revealed when the sentence is completed or the user pressed reveal.
  wordsEl.innerHTML = '';
  const words = tokenizeWords(SENTENCES[current].de);
  if (words.length === 0) return;

  for (let i = 0; i < words.length; i++) {
    const w = words[i];
    const chip = document.createElement('span');
    chip.className = 'word-chip' + (showText ? '' : ' hidden');
    chip.title = showText ? '點此朗讀單字' : `點此朗讀第 ${i + 1} 個字（文字已隱藏）`;

    const label = showText
      ? escape(w)
      : `<span class="chip-num">#${i + 1}</span> 🔊`;

    chip.innerHTML =
      `<span class="word-text">${label}</span>` +
      `<span class="spell-btn" title="逐字母拼讀（只播音，不顯示文字）">拼</span>`;

    chip.querySelector('.word-text').addEventListener('click', (e) => {
      e.stopPropagation();
      speakWord(w);
    });
    chip.querySelector('.spell-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      spellWord(w);
    });
    chip.addEventListener('click', () => speakWord(w));
    wordsEl.appendChild(chip);
  }
}

function update() {
  const target = SENTENCES[current].de;
  const typed = input.value;

  if (typed.length === 0 && !revealed) {
    diffEl.innerHTML = '';
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    renderWordChips(false);
    return;
  }

  const res = compare(typed, target);
  diffEl.innerHTML = res.html;

  // Show text on chips only when sentence is complete or reveal was pressed.
  // Otherwise chips still exist (for audio) but text is hidden.
  renderWordChips(revealed || res.isComplete);

  if (res.isComplete) {
    feedbackEl.textContent = '✅ 完美！按 Enter 進入下一句。';
    feedbackEl.className = 'feedback success';
    completed.add(current);
    attempted.add(current);
  } else if (res.firstWrongIdx !== -1) {
    feedbackEl.textContent = '❌ 有錯字，紅色為錯誤位置（背景灰色為正確答案）。';
    feedbackEl.className = 'feedback error';
    attempted.add(current);
  } else {
    feedbackEl.textContent = `⌛ 已輸入 ${typed.length} / ${target.length} 字元`;
    feedbackEl.className = 'feedback';
  }

  renderProgress();
  renderDots();
}

function goTo(i) {
  if (i < 0 || i >= SENTENCES.length) return;
  current = i;
  revealed = false;
  input.value = '';
  diffEl.innerHTML = '';
  feedbackEl.textContent = '';
  translationEl.classList.remove('show');
  $('transBtn').textContent = '🌐 翻譯';
  renderProgress();
  renderDots();
  renderTranslation();
  renderWordChips(false);
  input.focus();
  // Auto-play
  setTimeout(() => speakSentence(false), 250);
}

// ===== Event handlers =====
input.addEventListener('input', update);

$('playBtn').addEventListener('click', () => speakSentence(false));
$('slowBtn').addEventListener('click', () => speakSentence(true));

// Count how many chars of target are consumed by the typed input (matching algorithm).
// Mirrors compare() but only tracks target index, stopping at first mismatch.
function countConsumedTargetChars(typed, target) {
  let ti = 0, gi = 0;
  while (ti < typed.length && gi < target.length) {
    while (gi < target.length && shouldSkip(target[gi])) gi++;
    if (gi >= target.length) break;
    const t = typed[ti], g = target[gi];
    if (shouldSkip(t) && !shouldSkip(g) && normalizeChar(t) !== normalizeChar(g)) {
      ti++;
      continue;
    }
    const um = tryUmlautMatch(typed, ti, target, gi);
    if (um > 0) { ti += um; gi++; continue; }
    if (normalizeChar(t) === normalizeChar(g)) { ti++; gi++; }
    else break;
  }
  return gi;
}

$('hintBtn').addEventListener('click', () => {
  const target = SENTENCES[current].de;
  const res = compare(input.value, target);
  if (res.isComplete) return;
  if (res.firstWrongIdx !== -1) {
    input.value = input.value.slice(0, res.firstWrongIdx);
  }
  let gi = countConsumedTargetChars(input.value, target);
  while (gi < target.length && shouldSkip(target[gi])) {
    input.value += target[gi]; gi++;
  }
  if (gi < target.length) input.value += target[gi];
  attempted.add(current);
  update();
  input.focus();
});

$('revealBtn').addEventListener('click', () => {
  revealed = true;
  input.value = SENTENCES[current].de;
  attempted.add(current);
  update();
  speakSentence(false);
});

$('transBtn').addEventListener('click', () => {
  translationEl.classList.toggle('show');
  $('transBtn').textContent = translationEl.classList.contains('show') ? '🙈 隱藏翻譯' : '🌐 翻譯';
});

$('prevBtn').addEventListener('click', () => goTo(current - 1));
$('nextBtn').addEventListener('click', () => goTo(current + 1));

function populateLessonSelect() {
  const sel = $('lessonSelect');
  sel.innerHTML = '';
  LESSONS.forEach((lesson, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i + 1}. ${lesson.title.replace(/^[^\s]+ /, '')}`;
    sel.appendChild(opt);
  });
  sel.value = currentLesson;
}

function switchLesson(idx) {
  if (idx === currentLesson) return;
  synth.cancel();
  playbackToken++;
  currentLesson = idx;
  SENTENCES = LESSONS[idx].sentences;
  current = 0;
  attempted = new Set();
  completed = new Set();
  revealed = false;
  $('lessonTitle').textContent = LESSONS[idx].title + ' · 德文聽寫練習';
  input.value = '';
  diffEl.innerHTML = '';
  feedbackEl.textContent = '';
  translationEl.classList.remove('show');
  $('transBtn').textContent = '🌐 翻譯';
  renderDots();
  renderProgress();
  renderTranslation();
  renderWordChips(false);
  input.focus();
  statusEl.textContent = `📖 切換到：${LESSONS[idx].title}`;
  setTimeout(() => { statusEl.textContent = ''; }, 2000);
}

$('lessonSelect').addEventListener('change', (e) => {
  switchLesson(parseInt(e.target.value));
});

['rate', 'slowRate', 'pitch'].forEach(id => {
  const el = $(id);
  el.addEventListener('input', () => {
    const target = id === 'rate' ? $('rateVal') : id === 'slowRate' ? $('slowVal') : $('pitchVal');
    target.textContent = el.value;
  });
});

$('volume').addEventListener('input', () => {
  if (isMuted && parseFloat($('volume').value) > 0) isMuted = false;
  updateVolumeUI();
});
$('muteBtn').addEventListener('click', toggleMute);
['strictCase', 'strictPunct'].forEach(id => {
  $(id).addEventListener('change', update);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    speakSentence(e.shiftKey);
  } else if ((e.key === 'm' || e.key === 'M') && !e.metaKey && !e.ctrlKey && e.target !== input) {
    e.preventDefault();
    toggleMute();
  } else if (e.key === 'Enter' && !e.shiftKey) {
    if (e.target === input && input.value.trim()) {
      e.preventDefault();
      const res = compare(input.value, SENTENCES[current].de);
      if (res.isComplete || revealed) {
        if (current < SENTENCES.length - 1) goTo(current + 1);
      } else {
        // Just check
        update();
      }
    }
  }
});

window.addEventListener('beforeunload', () => synth.cancel());
